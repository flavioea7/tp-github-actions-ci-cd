name: Test
description: Ejecuta los tests

runs:
  using: composite
  steps:
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 21

    - name: Grant execute permission
      shell: bash
      run: chmod +x gradlew

    - name: Run tests
      shell: bash
      run: ./gradlew test